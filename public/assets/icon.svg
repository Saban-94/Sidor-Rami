<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="100%" height="100%">
  <defs>
    <radialGradient id="glow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#374151"/>
      <stop offset="100%" stop-color="#111827"/>
    </radialGradient>
    <linearGradient id="truck-grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#F59E0B"/>
      <stop offset="100%" stop-color="#D97706"/>
    </linearGradient>
  </defs>
  
  <!-- Smooth Maskable Squircle Background -->
  <rect x="0" y="0" width="512" height="512" rx="120" ry="120" fill="url(#glow)"/>
  
  <g transform="translate(46, 60)">
    <!-- Modern Hex Logistical Outer Frame -->
    <polygon points="210,12 375,108 375,300 210,396 45,300 45,108" fill="none" stroke="#374151" stroke-width="14" stroke-linejoin="round"/>
    
    <!-- Central Logistics Delivery Pulse (Waves) -->
    <path d="M 120,204 Q 210,154 300,204" fill="none" stroke="#D97706" stroke-width="8" stroke-linecap="round" opacity="0.45"/>
    <path d="M 140,234 Q 210,194 280,234" fill="none" stroke="#F59E0B" stroke-width="8" stroke-linecap="round" opacity="0.75"/>
    
    <!-- Stylized Modern Heavy Duty Cargo Container & Cab -->
    <!-- Chassis -->
    <rect x="110" y="270" width="200" height="15" rx="7" fill="#6B7280"/>
    
    <!-- Cargo Tanker/Box -->
    <rect x="110" y="154" width="130" height="110" rx="12" fill="url(#truck-grad)"/>
    
    <!-- Driver's Cabin -->
    <path d="M 248,184 L 285,184 Q 300,184 305,198 L 310,242 Q 312,254 300,254 L 248,254 Z" fill="#E5E7EB"/>
    
    <!-- Cabin Window -->
    <path d="M 252,192 L 278,192 Q 288,192 291,202 L 294,222 L 252,222 Z" fill="#1F2937"/>
    
    <!-- Heavy Duty Truck Off-road Wheels -->
    <circle cx="150" cy="292" r="24" fill="#111827" stroke="#9CA3AF" stroke-width="6"/>
    <circle cx="210" cy="292" r="24" fill="#111827" stroke="#9CA3AF" stroke-width="6"/>
    <circle cx="280" cy="292" r="24" fill="#111827" stroke="#9CA3AF" stroke-width="6"/>
    
    <!-- Glowing Headlight (Amber flare) -->
    <circle cx="316" cy="242" r="6" fill="#FBBF24"/>
    <polygon points="316,238 360,215 360,265 316,246" fill="#FBBF24" opacity="0.25"/>
  </g>
</svg>
